services:
  - type: web
    name: logos-platform-api
    runtime: docker
    repo: https://github.com/MykaelSalmarCosta/logos-platform.git
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 24
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://logos-platform.vercel.app,https://*.vercel.app
